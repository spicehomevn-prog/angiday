<!-- @dsCard group="Components" viewport="700x360" name="Icons — line-icon set" subtitle="Rounded-stroke currentColor icons, the elegant emoji replacement" -->
<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--card); font-family:var(--font-body); padding:22px; color:var(--ink); }
  .lbl { font-size:11px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--red); margin:0 0 12px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(86px, 1fr)); gap:14px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:7px; color:var(--ink); }
  .cell .nm { font-size:10.5px; color:var(--ink-soft); }
  .box { width:46px; height:46px; border-radius:13px; background:var(--surface-sunken); border:1px solid var(--line); display:grid; place-items:center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Icon } = window.NGYDesignSystem_adcec4;
  function Demo() {
    return (
      <div>
        <p className="lbl">28 icons · 24px grid · rounded stroke · currentColor</p>
        <div className="grid">
          {Icon.names.map(n => (
            <div className="cell" key={n}>
              <div className="box"><Icon name={n} size={24} /></div>
              <span className="nm">{n}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
