  body { margin:0; background:var(--bg-gradient); font-family:var(--font-body); padding:24px; color:var(--ink); }
  .lbl { font-size:11.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:var(--red); margin:0 0 12px; }

<body>
<div id="root"></div>
<script type="text/babel">
  const { TabBar, ProgressDots, Icon } = window.NGYDesignSystem_adcec4;
  function Demo() {
    const [tab, setTab] = React.useState('home');
    return (
      <div>
        <div className="grp">
          <p className="lbl">Progress dots — bước 3 / 6</p>
          <ProgressDots total={6} current={2} />
        </div>
        <div className="grp">
          <p className="lbl">Tab bar</p>
          <TabBar floating={false} active={tab} onChange={setTab} tabs={[
            { key:'home', icon:'home', label:'Hôm nay' },
            { key:'favorites', icon:'heart', label:'Đã lưu' },
            { key:'settings', icon:'settings', label:'Cài đặt' },
          ]} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
