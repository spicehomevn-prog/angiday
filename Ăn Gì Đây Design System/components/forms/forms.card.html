<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--bg-gradient); font-family:var(--font-body); padding:24px; color:var(--ink); }
  .wrap { display:flex; gap:32px; flex-wrap:wrap; align-items:flex-start; }
  .col { flex:1; min-width:240px; }
  .lbl { font-size:11.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:var(--red); margin:0 0 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Stepper } = window.NGYDesignSystem_adcec4;
  function Demo() {
    const [n, setN] = React.useState(4);
    const [name, setName] = React.useState('');
    return (
      <div className="wrap">
        <div className="col">
          <p className="lbl">Input</p>
          <Input label="Gọi gia đình mình là gì nhỉ?" placeholder="VD: nhà Bống, gia đình Minh..." value={name} onChange={e=>setName(e.target.value)} />
        </div>
        <div className="col">
          <p className="lbl">Stepper</p>
          <Stepper value={n} onChange={setN} unit="người" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
