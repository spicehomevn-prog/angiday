<!-- @dsCard group="Components" viewport="700x460" name="Core — Buttons, Chips, Card, Badge" subtitle="Pill buttons, selectable chips, surfaces & label pills" -->
<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--bg-gradient); font-family:var(--font-body); padding:24px; color:var(--ink); }
  .row { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:20px; }
  .lbl { font-size:11.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:var(--red); margin:0 0 10px; }
  .grp { margin-bottom:22px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Chip, Card, Badge, Icon } = window.NGYDesignSystem_adcec4;
  function Demo() {
    const [picked, setPicked] = React.useState('viet');
    return (
      <div>
        <div className="grp">
          <p className="lbl">Buttons</p>
          <div className="row">
            <Button variant="primary">Lắc thực đơn 🎲</Button>
            <Button variant="ghost">Chỉnh sửa</Button>
            <Button variant="soft">🎲 Lắc lại</Button>
            <Button variant="line">Quay lại</Button>
            <Button variant="primary" disabled>Đang chọn…</Button>
          </div>
          <div className="row">
            <Button variant="primary" size="lg">Bắt đầu nào 🌷</Button>
          </div>
        </div>

        <div className="grp">
          <p className="lbl">Chips</p>
          <div className="row">
            <Chip selected={picked==='viet'} onClick={()=>setPicked('viet')}>🍚 Món Việt</Chip>
            <Chip selected={picked==='a'} onClick={()=>setPicked('a')}>🍱 Món Á</Chip>
            <Chip selected={picked==='tay'} onClick={()=>setPicked('tay')}>🍝 Món Tây</Chip>
            <Chip tone="green" selected>Tỏi</Chip>
            <Chip tone="green">Sả</Chip>
          </div>
        </div>

        <div className="grp">
          <p className="lbl">Badges</p>
          <div className="row">
            <Badge tone="gold"><Icon name="drumstick" size={14} /> Đủ đạm</Badge>
            <Badge tone="green"><Icon name="leaf" size={14} /> Có rau xanh</Badge>
            <Badge tone="green"><Icon name="soup" size={14} /> Có canh</Badge>
            <Badge tone="plum"><Icon name="bone" size={14} /> Giàu canxi</Badge>
            <Badge tone="red"><Icon name="salad" size={14} /> Ít calo</Badge>
          </div>
        </div>

        <div className="grp">
          <p className="lbl">Card</p>
          <Card tone="warm" style={{maxWidth:340}}>
            <div style={{fontWeight:800, fontFamily:'var(--font-display)', fontSize:22, color:'var(--red-deep)'}}>Bữa nay ăn gì ta?</div>
            <p style={{color:'var(--ink-soft)', fontSize:14, margin:'4px 0 0'}}>Bấm để lắc ra thực đơn cho cả nhà</p>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
