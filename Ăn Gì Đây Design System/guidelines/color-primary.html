<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Chili Red" subtitle="The action color and its tints" -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--card);padding:18px}
  .row{display:flex;gap:14px}
  .sw{flex:1}
  .chip{height:64px;border-radius:14px;border:1px solid rgba(0,0,0,.06)}
  .nm{font-weight:700;font-size:13px;margin-top:8px;color:var(--ink)}
  .hex{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--red)"></div><div class="nm">--red</div><div class="hex">#E0533B</div></div>
    <div class="sw"><div class="chip" style="background:var(--red-deep)"></div><div class="nm">--red-deep</div><div class="hex">#C23E29</div></div>
    <div class="sw"><div class="chip" style="background:var(--red-deepest)"></div><div class="nm">--red-deepest</div><div class="hex">#A3331F</div></div>
    <div class="sw"><div class="chip" style="background:var(--red-soft)"></div><div class="nm">--red-soft</div><div class="hex">#FBE0D6</div></div>
  </div>
</body></html>
