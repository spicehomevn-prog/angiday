<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & Ink" subtitle="Paper backgrounds, card, ink text & hairline" -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--card);padding:18px}
  .row{display:flex;gap:14px}
  .sw{flex:1}
  .chip{height:64px;border-radius:14px;border:1px solid var(--line)}
  .nm{font-weight:700;font-size:13px;margin-top:8px;color:var(--ink)}
  .hex{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="nm">--paper</div><div class="hex">#FBF3E8</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-2)"></div><div class="nm">--paper-2</div><div class="hex">#F4E7D6</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-sunken)"></div><div class="nm">--surface-sunken</div><div class="hex">#FFFCF7</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="nm">--ink</div><div class="hex">#3B2A20</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-soft)"></div><div class="nm">--ink-soft</div><div class="hex">#9A8270</div></div>
  </div>
</body></html>
