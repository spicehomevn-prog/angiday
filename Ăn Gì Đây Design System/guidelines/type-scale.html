<!-- @dsCard group="Type" viewport="700x190" name="Type scale & eyebrow" subtitle="From hero to tiny caption, plus the uppercase eyebrow" -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--card);padding:20px;color:var(--ink)}
  .line{display:flex;align-items:baseline;gap:12px;margin-bottom:7px}
  .tok{font-size:11px;color:var(--ink-soft);font-variant-numeric:tabular-nums;width:120px;flex:none}
  .eyebrow{font-weight:700;font-size:11.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--red)}
</style></head>
<body>
  <div class="line"><span class="tok">hero · 33</span><span style="font-family:var(--font-display);font-weight:800;font-size:33px">Ăn gì đây</span></div>
  <div class="line"><span class="tok">h1 · 25</span><span style="font-family:var(--font-display);font-weight:700;font-size:25px;color:var(--red-deep)">Đã lưu</span></div>
  <div class="line"><span class="tok">h3 · 17</span><span style="font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--red-deep)">Bữa sáng</span></div>
  <div class="line"><span class="tok">body · 15</span><span style="font-size:15px">Thực đơn cân bằng cho cả nhà</span></div>
  <div class="line"><span class="tok">xs · 13</span><span style="font-size:13px;color:var(--ink-soft)">4 người · 200.000đ/ngày</span></div>
  <div class="line"><span class="tok">eyebrow · 11.5</span><span class="eyebrow">Hôm nay</span></div>
</body></html>
