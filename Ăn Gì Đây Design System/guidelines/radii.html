<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Card 26 · inner 18 · input 13 · pill 999" -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--card);padding:20px;color:var(--ink)}
  .row{display:flex;gap:18px;align-items:flex-end}
  .b{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:84px;height:64px;background:var(--red-soft);border:2px solid var(--red)}
  .nm{font-size:12px;color:var(--ink-soft)}
  .pill{width:110px;height:40px;border-radius:999px;background:var(--red);display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}
</style></head>
<body>
  <div class="row">
    <div class="b"><div class="box" style="border-radius:var(--r)"></div><div class="nm">--r · 26</div></div>
    <div class="b"><div class="box" style="border-radius:var(--r-md)"></div><div class="nm">--r-md · 18</div></div>
    <div class="b"><div class="box" style="border-radius:var(--r-sm)"></div><div class="nm">--r-sm · 13</div></div>
    <div class="b"><div class="pill">--r-pill</div><div class="nm">999</div></div>
  </div>
</body></html>
