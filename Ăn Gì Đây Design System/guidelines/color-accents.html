<!-- @dsCard group="Colors" viewport="700x150" name="Accents — Green, Gold, Plum" subtitle="Herb green, turmeric gold, plum + soft tints" -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--card);padding:18px}
  .row{display:flex;gap:12px}
  .sw{flex:1}
  .chip{height:44px;border-radius:12px;border:1px solid rgba(0,0,0,.06)}
  .chip.soft{height:20px;border-radius:0 0 12px 12px;margin-top:-1px}
  .nm{font-weight:700;font-size:12.5px;margin-top:8px;color:var(--ink)}
  .hex{font-size:11.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green)"></div><div class="chip soft" style="background:var(--green-soft)"></div><div class="nm">--green</div><div class="hex">#3F9A5B · soft #E4F1E5</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold)"></div><div class="chip soft" style="background:var(--gold-soft)"></div><div class="nm">--gold</div><div class="hex">#EFA53C · soft #FBEBCF</div></div>
    <div class="sw"><div class="chip" style="background:var(--plum)"></div><div class="chip soft" style="background:var(--plum-soft)"></div><div class="nm">--plum</div><div class="hex">#A8537E · soft #F6E2EC</div></div>
  </div>
</body></html>
