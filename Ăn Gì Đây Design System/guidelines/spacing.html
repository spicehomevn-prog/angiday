<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--card);padding:20px;color:var(--ink)}
  .row{display:flex;gap:16px;align-items:flex-end}
  .b{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--gold);border-radius:4px;width:26px}
  .nm{font-size:11px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="row">
    <div class="b"><div class="bar" style="height:4px"></div><div class="nm">1·4</div></div>
    <div class="b"><div class="bar" style="height:7px"></div><div class="nm">2·7</div></div>
    <div class="b"><div class="bar" style="height:10px"></div><div class="nm">3·10</div></div>
    <div class="b"><div class="bar" style="height:14px"></div><div class="nm">4·14</div></div>
    <div class="b"><div class="bar" style="height:16px"></div><div class="nm">5·16</div></div>
    <div class="b"><div class="bar" style="height:22px"></div><div class="nm">6·22</div></div>
    <div class="b"><div class="bar" style="height:24px"></div><div class="nm">7·24</div></div>
    <div class="b"><div class="bar" style="height:34px"></div><div class="nm">8·34</div></div>
  </div>
</body></html>
